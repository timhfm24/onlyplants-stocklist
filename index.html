<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>OnlyPlants by Tim Stocklist - Berlin</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
</head>
<body>
<header class="navbar">
  <div class="wrap nav-content">
    <div class="nav-title">
      <img src="logo.jpg" alt="OnlyPlants Logo" class="site-logo" />
      <span class="logo">OnlyPlants by Tim Stocklist - Berlin</span>
    </div>
    <div class="nav-contact-group">
      <div class="nav-contact-row">
        <span class="nav-contact-title">Kontakt</span>
        <div class="nav-contact-btns">
          <a class="insta-btn" href="https://instagram.com/only.plants.tim" target="_blank" aria-label="Instagram">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="[...]
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37"></path>
              <circle cx="17.5" cy="6.5" r="1.5"></circle>
            </svg>
            @only.plants.tim
          </a>
          <a class="mail-btn" href="mailto:only.plants.tim@gmail.com" aria-label="E-Mail">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="[...]
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            only.plants.tim@gmail.com
          </a>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="filters-row">
    <select id="genusFilter" onchange="filter()">
      <option value="">Gattung: Alle</option>
    </select>
    <select id="typeFilter" onchange="filter()">
      <option value="">Typ: Alle</option>
    </select>
    <select id="statusFilter" onchange="filter()">
      <option value="">Status: Alle</option>
      <option value="verfügbar" selected>Status: verfügbar</option>
      <option value="nicht verfügbar">Status: Nicht verfügbar</option>
    </select>
  </div>
  <ul class="plant-list" id="grid">
  </ul>
</main>

<footer>
  <div class="wrap" style="text-align:center; font-size:0.9rem; color:#555; padding:1.5rem 0;">
    © <span id="year"></span> OnlyPlants by Tim · 
    Die hier gelisteten Pflanzen zeigen den Bestand und Wert meiner privaten Pflanzensammlung.<br>
    <a href="/onlyplants-stocklist/impressum.html" style="color:#2d4739; text-decoration:none;">Impressum</a> · 
    <a href="/onlyplants-stocklist/datenschutz.html" style="color:#2d4739; text-decoration:none;">Datenschutz</a>
  </div>
</footer>

<script>
const q = (id)=>document.getElementById(id);
const grid = q('grid');
document.getElementById('year').textContent = new Date().getFullYear();
let allPlants = [];

fetch('plants.json', { cache: 'no-store' })
  .then(r => r.json())
  .then(data => {
    allPlants = data;
    setGenusOptions(data);
    setCategoryOptions(data);
    render(data);
    filter();
  })
  .catch(err => {
    grid.innerHTML = '<div>Fehler beim Laden der Stocklist.</div>';
    console.error(err);
  });

function getGenus(plantName) {
  return plantName.split(' ')[0];
}

function setGenusOptions(plants) {
  const genusFilter = q('genusFilter');
  const genera = Array.from(new Set(plants.map(p => getGenus(p.name)))).sort();
  genusFilter.innerHTML = '<option value="">Gattung: Alle</option>' +
    genera.map(genus => `<option value="${genus}">${genus}</option>`).join('');
}

function setCategoryOptions(plants) {
  const typeFilter = q('typeFilter');
  const categories = Array.from(new Set(plants.map(p => p.category)));
  typeFilter.innerHTML = '<option value="">Typ: Alle</option>' +
    categories.map(cat => `<option value="${cat}">${cat.charAt(0).toUpperCase() + cat.slice(1)}</option>`).join('');
}

function render(plants) {
  grid.innerHTML = plants.map(p => plantListItem(p)).join('');
}

function plantListItem(p) {
  let type = p.category;
  const typeLabel = type.charAt(0).toUpperCase() + type.slice(1);
  const status = p.state || 'verfügbar';
  const price = p.preis ? p.preis.toFixed(2) + ' €' : '';
  const genus = getGenus(p.name);
  
  let tagClass = 'ok';
  if(status === 'reserviert') tagClass = 'warn';
  if(status === 'nicht verfügbar') tagClass = 'sold';
  
  return `<li class="plant-item" data-name="${escapeHTML(p.name)}" data-genus="${genus}" data-type="${type}" data-status="${status}">
    <div>
      <strong>${escapeHTML(p.name)}</strong>
      <div class="meta"><span class="genus-badge">${genus}</span>${typeLabel}</div>
    </div>
    <span class="price">${price}</span>
    <span class="tag ${tagClass}">${status}</span>
  </li>`;
}

function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c]));
}

function filter(){
  const g = q('genusFilter').value;
  const t = q('typeFilter').value;
  const st = q('statusFilter').value;
  const filtered = allPlants.filter(p => {
    const genus = getGenus(p.name);
    return (!g || genus === g) && (!t || p.category === t) && (!st || (p.state || 'verfügbar') === st);
  });
  render(filtered);
}
</script>
</body>
</html>
